name: "bioinformatics"
description: "Biomedical research and computational biology"
version: "1.0"

identity:
  purpose: "Co-scientist research agent for bioinformatics hypothesis discovery"
  domain: "Bioinformatics and computational biology"
  focus_areas:
    - "biomarker discovery"
    - "multi-omics integration"
    - "clinical genomics"
    - "inflammatory disease mechanisms"

config_overrides:
  data_layers:
    - Genomics
    - Transcriptomics
    - Proteomics
    - Metabolomics
    - Epigenomics
    - Metagenomics
    - Clinical/EHR
    - scRNA-seq
  research:
    primary: pubmed
    fallback: arxiv
    last_resort: web-search
  literature:
    sources: [pubmed, arxiv, semantic_scholar, openalex]
    default: all
    enrichment:
      enabled: [crossref, unpaywall]
      timeout_per_doi: 5

env_vars:
  required:
    NCBI_EMAIL: "Required by NCBI API policy -- use your institutional email"
    OPENALEX_API_KEY: "OpenAlex API key -- https://openalex.org/"
    LITERATURE_ENRICHMENT_EMAIL: "For CrossRef polite pool + Unpaywall TOS -- your institutional email"
  optional:
    NCBI_API_KEY: "NCBI EUTILS for 10 req/s -- https://www.ncbi.nlm.nih.gov/account/settings/"
    S2_API_KEY: "Semantic Scholar higher rate limits -- https://www.semanticscholar.org/product/api"
